app_title: "Thomas Rouaud"
logo_url: /images/lm-logo.png

backend:
  name: github
  repo: lm-stack/tr
  branch: main
  base_url: https://sveltia-cms-auth.hello-cb2.workers.dev

site_url: https://thomasrouaud.com

media_folder: "public/images"
public_folder: "/images"

collections:
  - name: pages
    label: Pages
    icon: description
    files:
      - name: home
        label: Home
        icon: home
        file: "src/content/pages/home.yml"
        preview_path: "/"
        fields:
          - label: SEO
            name: seo
            widget: object
            fields:
              - { label: Title, name: title, widget: string }
              - { label: Description, name: description, widget: text }
              - { label: OG Image, name: ogImage, widget: image, required: false }
          - label: Hero
            name: hero
            widget: object
            fields:
              - { label: Title, name: title, widget: string }
              - { label: Subtitle, name: subtitle, widget: string }
          - label: Footer
            name: footer
            widget: object
            fields:
              - { label: Description, name: description, widget: text }

  # Settings always last in CMS sidebar
  - name: settings
    label: Settings
    icon: settings
    files:
      - name: site
        label: Site
        icon: language
        file: "src/content/settings/site.json"
        format: json
        fields:
          - { label: Site Name, name: name, widget: string }
          - { label: Logo (text), name: logoText, widget: string }
          - { label: Logo (Phosphor icon), name: logoIcon, widget: string, hint: "phosphoricons.com → copy name (e.g. ph-house)" }
          - { label: Copyright, name: copyright, widget: string }
          - { label: Webhook Token, name: webhookToken, widget: string, required: false, hint: "Bearer token for webhook authentication" }

      - name: coordonnees
        label: Contact info
        icon: contact_phone
        file: "src/content/settings/coordonnees.json"
        format: json
        fields:
          - { label: Email, name: email, widget: string }
          - { label: Phone, name: phone, widget: string, required: false }
          - { label: Address, name: address, widget: string, required: false }

      - name: social
        label: Social networks
        icon: share
        file: "src/content/settings/social.json"
        format: json
        fields:
          - label: Social networks
            name: social
            widget: list
            required: false
            fields:
              - { label: Network, name: label, widget: string }
              - { label: URL, name: url, widget: string }
              - { label: Phosphor icon, name: icon, widget: string, hint: "phosphoricons.com → copy name (e.g. ph-house)" }
